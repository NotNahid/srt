<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Responsive Subtitle Player</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* Subtitle container */
#subtitle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px; /* default size */
  text-align:center;
  max-width:90%;
  line-height:1.2;
  word-wrap: break-word;
  text-shadow: 2px 2px 4px black;
  white-space:pre-wrap;
}

/* Small video */
#video{
  position:fixed;
  bottom:20px;
  right:20px;
  width:320px;
  height:180px;
  border:2px solid #333;
  border-radius:8px;
  background:black;
}

/* Navigation buttons */
#controls{
  position:fixed;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
}
#controls button{
  font-size:24px;
  padding:10px 14px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
  text-shadow:1px 1px 2px black;
}
#controls button:active{
  background:rgba(255,255,255,0.4);
}
</style>
</head>
<body>

<div id="subtitle">Loading subtitles...</div>
<div id="video"></div>

<div id="controls">
  <button onclick="seek(-10)">⏪ 10s</button>
  <button onclick="togglePlay()">⏯️</button>
  <button onclick="seek(10)">10s ⏩</button>
  <button onclick="seek(-60)">⏪ 1m</button>
  <button onclick="seek(60)">1m ⏩</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let subtitles=[];

// Load SRT
fetch("subs.srt")
  .then(res => res.text())
  .then(data => parseSRT(data));

// YouTube video link
const youtubeLink = "https://www.youtube.com/watch?v=7bGKwWMHXpQ";

// Extract video ID
function extractVideoID(url){
  let id="";
  if(url.includes("v=")) id=url.split("v=")[1].split("&")[0];
  else if(url.includes("youtu.be/")) id=url.split("youtu.be/")[1].split("?")[0];
  else if(url.includes("embed/")) id=url.split("embed/")[1].split("?")[0];
  return id;
}

// Auto-load video
function loadVideo(){
  let videoID = extractVideoID(youtubeLink);
  player = new YT.Player("video",{
    height:"180",
    width:"320",
    videoId:videoID,
    playerVars:{rel:0,modestbranding:1,playsinline:1,autoplay:1},
    events:{'onReady':onPlayerReady}
  });
}
function onYouTubeIframeAPIReady(){ loadVideo(); }
function onPlayerReady(){ setInterval(updateSubtitle,100); }

// Parse SRT
function parseSRT(data){
  let blocks=data.split(/\n\n+/);
  subtitles=blocks.map(block=>{
    let lines=block.split("\n");
    if(lines.length>=3){
      let times=lines[1].split(" --> ");
      return { start:toSeconds(times[0]), end:toSeconds(times[1]), text:lines.slice(2).join(" ") };
    }
  }).filter(Boolean);
}
function toSeconds(time){
  let parts=time.replace(",",".").split(":");
  return parseFloat(parts[0])*3600 + parseFloat(parts[1])*60 + parseFloat(parts[2]);
}

// Update subtitle
function updateSubtitle(){
  if(!player || !player.getCurrentTime) return;
  let time=player.getCurrentTime();
  for(let s of subtitles){
    if(time>=s.start && time<=s.end){
      displaySubtitle(s.text);
      return;
    }
  }
}

// Smart subtitle display with auto font scaling
function displaySubtitle(text){
  const subEl = document.getElementById("subtitle");
  subEl.innerText = text;
  let fontSize = 80; // default
  subEl.style.fontSize = fontSize + "px";

  // Reduce font size until it fits inside 90% width
  while(subEl.scrollWidth > window.innerWidth * 0.9 && fontSize > 20){
    fontSize -= 2;
    subEl.style.fontSize = fontSize + "px";
  }
}

// Keyboard shortcuts
document.addEventListener("keydown",function(e){
  if(!player) return;
  let t = player.getCurrentTime();
  switch(e.code){
    case "Space": togglePlay(); e.preventDefault(); break;
    case "ArrowRight": seek(10); break;
    case "ArrowLeft": seek(-10); break;
    case "KeyL": seek(60); break;
    case "KeyJ": seek(-60); break;
  }
});

// Seek function
function seek(seconds){
  if(!player) return;
  let t = player.getCurrentTime();
  player.seekTo(Math.max(t+seconds,0),true);
}

// Play/pause toggle
function togglePlay(){
  if(!player) return;
  player.getPlayerState()===1 ? player.pauseVideo() : player.playVideo();
}
</script>
</body>
</html>
